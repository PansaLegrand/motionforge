<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>motionforge playground</title>
  </head>
  <body>
    <main class="app">
      <section class="preview">
        <canvas id="preview" width="1080" height="1920"></canvas>
      </section>
      <aside class="panel">
        <div>
          <h1>motionforge</h1>
          <p>JSON scenes rendered and exported in the browser.</p>
        </div>
        <label>
          Scene
          <select id="scene"></select>
        </label>
        <section class="scene-info" aria-live="polite">
          <h2 id="scene-title"></h2>
          <p id="scene-description"></p>
          <ul id="scene-proves"></ul>
        </section>
        <label>
          Frame
          <input id="frame" type="range" min="0" max="119" value="0" />
        </label>
        <output id="frame-readout">0</output>
        <button id="play" type="button">Play</button>
        <button id="export" type="button" class="secondary">Export MP4</button>
        <output id="export-status"></output>
        <details class="agent-console" open>
          <summary>Agent console</summary>
          <p class="agent-hint">
            Paste a scene document or a patch (an array of ops like
            <code>[{"op":"setText","id":"…","text":"…"}]</code>). The same
            APIs an agent uses: <code>validateScene</code> /
            <code>applyScenePatch</code>.
          </p>
          <textarea
            id="agent-input"
            rows="6"
            spellcheck="false"
            placeholder='[{ "op": "setStyle", "id": "node-id", "style": { "color": "#ffd166" } }]'
          ></textarea>
          <div class="agent-buttons">
            <button id="agent-apply" type="button">Apply patch</button>
            <button id="agent-load" type="button" class="secondary">
              Load as scene
            </button>
            <button id="agent-copy" type="button" class="secondary">
              Copy scene JSON
            </button>
          </div>
          <pre id="agent-output" aria-live="polite"></pre>
        </details>
        <pre id="capability"></pre>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
