name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @motionforge/golden exec playwright install --with-deps chromium
      # Build first: package tsconfigs use project references, so typecheck
      # needs the referenced declaration outputs to exist.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm golden:test
